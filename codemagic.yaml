workflows:
  ios-capacitor-debug:
    name: NovaMed iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios

      - name: Create iOS platform
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Check iOS files
        script: |
          echo "Root files:"
          ls -la
          echo "iOS folder:"
          ls -la ios || true
          echo "iOS App folder:"
          ls -la ios/App || true

      - name: Build iOS Simulator App
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ../../build/ios \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip simulator app
        script: |
          APP_PATH=$(find ios/build/ios/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ios/App/../../build/ios/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -n 1)
          fi
          echo "APP_PATH=$APP_PATH"
          zip -r NovaMed-iOS-Simulator.app.zip "$APP_PATH"

    artifacts:
      - NovaMed-iOS-Simulator.app.zip
      - build/ios/Build/Products/Debug-iphonesimulator/*.app
