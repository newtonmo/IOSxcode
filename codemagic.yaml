workflows:
  ios-capacitor-debug:
    name: NovaMed iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios

      - name: Create iOS platform
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Check iOS files
        script: |
          echo "Root files:"
          ls -la
          echo "iOS folder:"
          ls -la ios || true
          echo "iOS App folder:"
          ls -la ios/App || true
          echo "Search Xcode files:"
          find ios -maxdepth 4 -name "*.xcworkspace" -o -name "*.xcodeproj"

      - name: Install CocoaPods if available
        script: |
          cd ios/App
          if [ -f "Podfile" ]; then
            pod install --repo-update || true
          fi
          ls -la

      - name: Build iOS Simulator App
        script: |
          cd ios/App

          if [ -f "App.xcworkspace" ]; then
            echo "Building using App.xcworkspace"
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -derivedDataPath ../../build/ios \
              CODE_SIGNING_ALLOWED=NO \
              build

          elif [ -d "App.xcodeproj" ]; then
            echo "Building using App.xcodeproj"
            xcodebuild \
              -project App.xcodeproj \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -derivedDataPath ../../build/ios \
              CODE_SIGNING_ALLOWED=NO \
              build

          else
            echo "No App.xcworkspace or App.xcodeproj found"
            ls -la
            exit 1
          fi

      - name: Zip simulator app
        script: |
          APP_PATH=$(find build/ios/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "No .app file found"
            find build -type d || true
            exit 1
          fi

          zip -r NovaMed-iOS-Simulator.app.zip "$APP_PATH"

    artifacts:
      - NovaMed-iOS-Simulator.app.zip
      - build/ios/Build/Products/Debug-iphonesimulator/*.app
