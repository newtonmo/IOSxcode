workflows:
  ios-capacitor-unsigned-ipa:
    name: NovaMed iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios

      - name: Create iOS platform
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods if available
        script: |
          cd ios/App
          if [ -f "Podfile" ]; then
            pod install --repo-update || true
          fi
          ls -la

      - name: Build unsigned iPhone app
        script: |
          cd ios/App

          if [ -f "App.xcworkspace" ]; then
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -destination generic/platform=iOS \
              -derivedDataPath ../../build/ios \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build

          elif [ -d "App.xcodeproj" ]; then
            xcodebuild \
              -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -destination generic/platform=iOS \
              -derivedDataPath ../../build/ios \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              build
          else
            echo "No Xcode project found"
            ls -la
            exit 1
          fi

      - name: Create unsigned IPA
        script: |
          APP_PATH=$(find build/ios/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "No .app file found"
            find build -type d || true
            exit 1
          fi

          rm -rf Payload
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r NovaMed-unsigned.ipa Payload

    artifacts:
      - NovaMed-unsigned.ipa
